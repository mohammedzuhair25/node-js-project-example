#workflow:
#  rules:
#    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main"'

stages:
  - build
  - test
  - image_build
  - deploy_dev

variables:
  NODE_IMAGE: node:18-alpine
  IMAGE_NAME: mzm1/node-swagger-metrics
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_DRIVER: overlay2


default:
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths: 
        - node-modules/

# -------------------
# Install dependencies
# -------------------
build:
  stage: build
  image: $NODE_IMAGE
  script:
    - echo "Installing dependencies..."
    - npm install --production
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
#  rules:
#    - if: '$CI_COMMIT_BRANCH != "main"'
#      when: always


# -------------------
# Run tests
# -------------------
test:
  stage: test
  image: $NODE_IMAGE
  dependencies:
    - build
  script:
    - echo "Running tests..."
 # rules:
 #   - if: '$CI_COMMIT_BRANCH != "main"'
 #     when: always



# -------------------
# Build Docker image
# -------------------
image_build:
  stage: image_build
  image: docker
  dependencies:
    - build
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
  script:
   - docker build -t $IMAGE_NAME:$IMAGE_TAG .
   - docker push $IMAGE_NAME:$IMAGE_TAG
#  rules:
#    - if: '$CI_COMMIT_BRANCH != "main"'
#      when: always


# -------------------
# Deploy
# -------------------
deploy-dev:
  stage: deploy_dev
  image: alpine:latest
  dependencies:
    - image_build
  script:
    - echo "Deploying app..."
#  rules:
#    - if: '$CI_COMMIT_BRANCH != "main"'
#      when: always

