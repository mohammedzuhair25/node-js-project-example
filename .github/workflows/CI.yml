name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:

jobs:
  call-ci:
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/node.js.yml@main
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}