name: Node.js CI


on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true
      GH_PAT:
        required: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies, build
      run: |
        npm ci
    - name: Audit dependencies
      run: npm audit --audit-level=high
    - name: Run lint
      run: npm run lint
        
  nodejs-test:
    runs-on: ubuntu-latest
   
    needs: build
    steps:
     - uses: actions/checkout@v4
     - name: Use Node.js 20.x
       uses: actions/setup-node@v4
       with:
         node-version: 24.x
         cache: 'npm'
     - name: Run tests
       run: |
         npm ci
         npm audit --audit-level=high
         npm run lint
         npm test -- --coverage

     - name: Run tests with JUnit output
       run: npm test -- --reporters=default --reporters=jest-junit

     - name: Publish test results
       if: always()
       uses: EnricoMi/publish-unit-test-result-action@v2
       with:
         files: junit.xml

     - name: Upload test results
       if: always()
       uses: actions/upload-artifact@v4
       with:
        name: test-results
        path: junit.xml
  
     - name : Upload source code as artifact    
       uses: actions/upload-artifact@v4
       with:
          name: image-depedency
          path: |
           package.json
           package-lock.json
           *.mjs
           Dockerfile
           public/index.html
           
  sonarqube:
    runs-on: ubuntu-latest
    needs: nodejs-test
    steps:
    - uses: actions/checkout@v4
      with:
        # Disabling shallow clones is recommended for improving the relevancy of reporting
        fetch-depth: 0
    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'
    - name: Install dependencies
      run: npm ci

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-image:
    if: github.ref == 'refs/heads/main'
    needs: sonarqube
    env:
       Dockerimage: mzm1/node-swagger-metrics:${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

    - name : Download source code artifact
      uses: actions/download-artifact@v4
      with:
        name: image-depedency

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
       context: .
       push: true  # or true if pushing to registry
       tags: mzm1/node-swagger-metrics:${{ github.sha }}

  Scan_image_for_vulnerabilities:
    if: github.ref == 'refs/heads/main'
    needs: build-image
    runs-on: ubuntu-latest
    steps:
    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@v0.35.0
      with:
          image-ref: mzm1/node-swagger-metrics:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
