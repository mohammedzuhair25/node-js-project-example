# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests and build docker image
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies, build
      run: |
        npm install --production
    - name: Run tests
      run: |
        npm ci --only=if-present
        npm test

    - name : Upload source code as artifact    
      uses: actions/upload-artifact@v4
      with:
       name: source-code
       path: |
        package.json
        server.mjs
        Dockerfile

  build-image:
    needs: build
    env:
       Dockerimage: mzm1/node-swagger-metrics:${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

    - name : Download source code artifact
      uses: actions/download-artifact@v4
      with:
        name: source-code

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t $Dockerimage .

    - name: Push image
      run: docker push $Dockerimage
