# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests and build docker image
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches:
      - main
      - feature/**
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies, build
      run: |
        npm ci --omit=dev
        
  nodejs-test:
    runs-on: ubuntu-latest
   
    needs: build
    steps:
     - uses: actions/checkout@v4
     - name: Use Node.js 24.x
       uses: actions/setup-node@v4
       with:
         node-version: 24.x
     - name: Run tests
       run: |
         npm ci --omit=dev
         npm test -- --coverage

     - name: Run tests with JUnit output
       run: npm test -- --reporters=default --reporters=jest-junit

     - name: Upload test results
       uses: actions/upload-artifact@v4
       with:
        name: test-results
        path: junit.xml
  
     - name : Upload source code as artifact    
       uses: actions/upload-artifact@v4
       with:
          name: image-depedency
          path: |
           package.json
           package-lock.json
           server.mjs
           Dockerfile
          
  build-image:
    if: github.ref == 'refs/heads/main'
    needs: nodejs-test
    env:
       Dockerimage: mzm1/node-swagger-metrics:${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

    - name : Download source code artifact
      uses: actions/download-artifact@v4
      with:
        name: image-depedency

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t $Dockerimage .

    - name: Push image
      run: docker push $Dockerimage

  Scan_image_for_vulnerabilities:
    if: github.ref == 'refs/heads/main'
    needs: build-image
    runs-on: ubuntu-latest
    steps:
    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@v0.35.0
      with:
          image-ref: mzm1/node-swagger-metrics:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
  update-k8s-repo:
    if: github.ref == 'refs/heads/main'
    concurrency: 
      group: update-k8s-repo
      cancel-in-progress: true
    needs: Scan_image_for_vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - name: Checkout node js k8s manifest repo
        uses: actions/checkout@v4

      - name: Clone target repo
        run: |
          #git clone https://github.com/mohammedzuhair25/node-js-example-k8s.git
           git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/mohammedzuhair25/node-js-example-k8s.git

      - name: Update Deployment manifest
        run: |
          cd node-js-example-k8s/node-app-k8s-manifest-dev
          ls -ltr
          yq -i ".spec.template.spec.containers[0].image = \"mzm1/node-swagger-metrics:${{ github.sha }}\"" node-app-deployment.yml
      - name: Commit and push
        run: |
          cd node-js-example-k8s
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image with latest tag ${{ github.sha }}"
          git push
