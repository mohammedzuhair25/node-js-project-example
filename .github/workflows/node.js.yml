name: Node.js CI


on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GH_PAT:
        required: true
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies, build
      run: |
        npm ci
        
  nodejs-test:
    runs-on: ubuntu-latest
   
    needs: build
    steps:
     - uses: actions/checkout@v4
     - name: Use Node.js 20.x
       uses: actions/setup-node@v4
       with:
         node-version: 24.x
     - name: Run tests
       run: |
         npm ci
         npm test -- --coverage

     - name: Run tests with JUnit output
       run: npm test -- --reporters=default --reporters=jest-junit

     - name: Upload test results
       uses: actions/upload-artifact@v4
       with:
        name: test-results
        path: junit.xml
  
     - name : Upload source code as artifact    
       uses: actions/upload-artifact@v4
       with:
          name: image-depedency
          path: |
           package.json
           package-lock.json
           server.mjs
           Dockerfile
          
  build-image:
    if: github.ref == 'refs/heads/main'
    needs: nodejs-test
    env:
       Dockerimage: mzm1/node-swagger-metrics:${{ github.sha }}
    runs-on: ubuntu-latest
    steps:

    - name : Download source code artifact
      uses: actions/download-artifact@v4
      with:
        name: image-depedency

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t $Dockerimage .

    - name: Push image
      run: docker push $Dockerimage

  Scan_image_for_vulnerabilities:
    if: github.ref == 'refs/heads/main'
    needs: build-image
    runs-on: ubuntu-latest
    steps:
    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@v0.35.0
      with:
          image-ref: mzm1/node-swagger-metrics:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
