```yaml
name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_ENV: dev

jobs:
  setup:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      is_release: ${{ steps.resolve.outputs.is_release }}

    steps:
      - name: Resolve environment
        id: resolve
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

          # Manual trigger takes priority
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            SHOULD_DEPLOY=true
            IS_RELEASE=false

          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="prod"
            SHOULD_DEPLOY=true
            IS_RELEASE=true

          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/ ]]; then
            ENV="staging"
            SHOULD_DEPLOY=true
            IS_RELEASE=true

          elif [[ "${{ github.ref }}" =~ ^refs/heads/hotfix/ ]]; then
            ENV="staging"
            SHOULD_DEPLOY=true
            IS_RELEASE=false

          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENV="dev"
            SHOULD_DEPLOY=true
            IS_RELEASE=false

          elif [[ "${{ github.ref }}" =~ ^refs/heads/feature/ ]]; then
            ENV="dev"
            SHOULD_DEPLOY=true
            IS_RELEASE=false

          else
            ENV="${DEFAULT_ENV}"
            SHOULD_DEPLOY=false
            IS_RELEASE=false
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT

      - name: Debug
        run: |
          echo "Environment: ${{ steps.resolve.outputs.environment }}"
          echo "Deploy: ${{ steps.resolve.outputs.should_deploy }}"
          echo "Release: ${{ steps.resolve.outputs.is_release }}"

  ci:
    name: CI Pipeline
    needs: setup
    if: always()
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/CI.yml@main
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GH_PAT: ${{ secrets.GH_PAT }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  db-migration:
    name: DB Migration (Staging Only)
    needs: setup
    if: |
      needs.setup.outputs.environment == 'staging' &&
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/'))
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/flyway-staging.yml@main
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GH_PAT: ${{ secrets.GH_PAT }}

  deploy:
    name: Deploy
    needs: [setup, ci]
    if: needs.setup.outputs.should_deploy == 'true' && github.event_name != 'pull_request'
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/CD.yml@main
    with:
      environment: ${{ needs.setup.outputs.environment }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  release:
    name: Create Release
    needs: [setup, ci, deploy]
    if: |
      needs.setup.outputs.is_release == 'true' &&
      needs.setup.outputs.environment == 'prod' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate version
        id: version
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          MAJOR=$(echo $TAG | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $TAG | cut -d. -f2)
          PATCH=$(echo $TAG | cut -d. -f3)

          NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag safely
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag exists, skipping"
          else
            git tag $VERSION
            git push origin $VERSION
          fi

      - name: Generate changelog
        id: changelog
        run: |
          LOG=$(git log ${{ steps.latest.outputs.tag }}..HEAD --oneline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Release Info
            Version: ${{ steps.version.outputs.version }}
            Previous: ${{ steps.latest.outputs.tag }}

            ## Changes
            ${{ steps.changelog.outputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
