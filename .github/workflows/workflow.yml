name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for manual deployment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Determine target environment based on branch
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should-deploy: ${{ steps.set-env.outputs.should-deploy }}
      is-release: ${{ steps.set-env.outputs.is-release }}
    steps:
      - name: Set Environment Variables
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "is-release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/release/"* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "is-release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "is-release=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/hotfix/"* ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "is-release=false" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "is-release=false" >> $GITHUB_OUTPUT
          fi
      - name: Debug Environment
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Environment: ${{ steps.set-env.outputs.environment }}"
          echo "Should Deploy: ${{ steps.set-env.outputs.should-deploy }}"
          echo "Is Release: ${{ steps.set-env.outputs.is-release }}"

  db-migration-staging:
    needs: setup
    if: (github.ref == 'refs/heads/feature/db-migration-staging' || github.ref == 'refs/heads/hotfix/db-migration-staging') && github.event_name == 'push'
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/flyway-staging.yml@main
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GH_PAT: ${{ secrets.GH_PAT }}

  ci:
    needs: setup
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/CI.yml@main
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      GH_PAT: ${{ secrets.GH_PAT }}

  deploy-environment:
    needs: [ setup, ci ]
    if: needs.setup.outputs.should-deploy == 'true' && github.event_name == 'push'
    uses: mohammedzuhair25/node-js-project-example/.github/workflows/CD.yml@main
    with:
      environment: ${{ needs.setup.outputs.environment }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}


  create-release:
    needs: [ setup, ci ,deploy-environment]
    if: needs.setup.outputs.is-release == 'true' && needs.setup.outputs.environment == 'prod' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get Latest Tag
        id: latest-tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
      
      - name: Generate New Version
        id: version
        run: |
          LATEST_TAG="${{ steps.latest-tag.outputs.tag }}"
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          
          # Increment patch version for releases
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Previous version: $LATEST_TAG"
          echo "New version: $NEW_VERSION"
      
      - name: Create Git Tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
      
      - name: Generate Release Notes
        id: changelog
        run: |
          # Get commits since last tag
          COMMITS=$(git log ${{ steps.latest-tag.outputs.tag }}..HEAD --oneline)
          CHANGELOG="## Changes\n\n$COMMITS"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Release Information
            **Version:** ${{ steps.version.outputs.version }}
            **Previous Version:** ${{ steps.latest-tag.outputs.tag }}
            **Branch:** ${{ github.ref }}
            **Commit:** ${{ github.sha }}
            
            ## Changes Since Last Release
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}