name: Flyway DB Migration (Dev)

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      GH_PAT:
        required: true

jobs:
  db-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name : check files
        run: ls -ltr 
        
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Flyway Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flyway-migrations:staging-${{ github.sha }} ./flyway
          docker push ${{ secrets.DOCKER_USERNAME }}/flyway-migrations:staging-${{ github.sha }}